spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DATABASE_JDBC_URL}           # ← Changed from DATABASE_URL
    username: ${SPRING_DATASOURCE_USERNAME}  # ← Changed from DB_USERNAME
    password: ${SPRING_DATASOURCE_PASSWORD}  # ← Changed from DB_PASSWORD
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

paystack:
  secret-key: ${PAYSTACK_SECRET_KEY}
  public-key: ${PAYSTACK_PUBLIC_KEY}
  base-url: ${PAYSTACK_BASE_URL}        # ← Changed from hardcoded URL

termii:
  api-key: ${TERMII_API_KEY}
  sender-id: ${TERMII_SENDER_ID}
  base-url: ${TERMII_BASE_URL}          # ← Changed from hardcoded URL

sendgrid:
  api-key: ${SENDGRID_API_KEY}
  from-email: ${SENDGRID_FROM_EMAIL}
  from-name: ${SENDGRID_FROM_NAME}

admin:
  registration:
    secret: ${ADMIN_REGISTRATION_SECRET}

server:
  port: 8080

logging:
  level:
    org.springframework.security: WARN
    com.ajo.platform: INFO